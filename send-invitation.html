<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send Invitation - The Shriks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      color: #F0EDE6;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      width: 100%;
      background: #0F0F0F;
      border: 1px solid #1E1E1E;
      padding: 40px;
    }
    h1 {
      color: #C8A96E;
      font-size: 24px;
      margin-bottom: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    p {
      color: #A0A0A0;
      font-size: 14px;
      margin-bottom: 30px;
    }
    label {
      display: block;
      color: #C8A96E;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: #080808;
      border: 1px solid #2A2A2A;
      color: #F0EDE6;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 20px;
    }
    input:focus {
      outline: none;
      border-color: #C8A96E;
    }
    button {
      width: 100%;
      background: #C8A96E;
      color: #080808;
      border: none;
      padding: 14px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #F0EDE6;
    }
    button:disabled {
      background: #505050;
      cursor: not-allowed;
    }
    .message {
      margin-top: 20px;
      padding: 12px;
      border-left: 3px solid #C8A96E;
      background: rgba(200, 169, 110, 0.1);
      color: #C8A96E;
      font-size: 13px;
      display: none;
    }
    .message.error {
      border-left-color: #ff4444;
      background: rgba(255, 68, 68, 0.1);
      color: #ff4444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Send Invitation</h1>
    <p>Send agreement invitation email to a candidate</p>
    
    <form id="invitationForm">
      <label for="name">Candidate Name</label>
      <input type="text" id="name" placeholder="e.g., Sutariya Hemanshu" required>
      
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="e.g., hemanshu@example.com" required>
      
      <button type="submit" id="submitBtn">Send Invitation</button>
    </form>
    
    <div id="message" class="message"></div>
  </div>

  <script>
    const form = document.getElementById('invitationForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');

    // Determine API URL based on environment
    const API_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:3000/api'
      : 'https://team.theshriks.space/api';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      messageDiv.style.display = 'none';
      
      try {
        const response = await fetch(`${API_URL}/send-invitation`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            recipientName: name,
            recipientEmail: email
          })
        });
        
        const result = await response.json();
        
        if (result.success) {
          messageDiv.className = 'message';
          messageDiv.textContent = `✓ Invitation sent successfully to ${email}`;
          messageDiv.style.display = 'block';
          form.reset();
        } else {
          throw new Error(result.error);
        }
      } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = `✗ Error: ${error.message}`;
        messageDiv.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Invitation';
      }
    });
  </script>
</body>
</html>
